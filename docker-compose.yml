      AD_ALLOW_INSECURE_TLS: ${AD_ALLOW_INSECURE_TLS:-false}
      AD_USER_BASE_DN: ${AD_USER_BASE_DN:-DC=example,DC=local}
      AD_COMPUTER_PHYSICAL_BASE_DN: ${AD_COMPUTER_PHYSICAL_BASE_DN:-OU=Workstations,DC=example,DC=local}
      AD_COMPUTER_VIRTUAL_BASE_DN: ${AD_COMPUTER_VIRTUAL_BASE_DN:-OU=Virtual Workstations,OU=Workstations,DC=example,DC=local}
      AD_PHYSICAL_SEARCH_SCOPE: ${AD_PHYSICAL_SEARCH_SCOPE:-LEVEL}
      AD_VIRTUAL_SEARCH_SCOPE: ${AD_VIRTUAL_SEARCH_SCOPE:-SUBTREE}
      CHECKPOINT_VPN_GROUP_DN: ${CHECKPOINT_VPN_GROUP_DN:-CN=VPN_Access,OU=Groups,DC=example,DC=local}
      CHECKPOINT_FIREWALL_GROUP_DN: ${CHECKPOINT_FIREWALL_GROUP_DN:-CN=Firewall_Access,OU=Groups,DC=example,DC=local}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-300}
      DELETE_MISSING_COMPUTERS: ${DELETE_MISSING_COMPUTERS:-true}
      WRITE_EXPORT_ON_CHANGE: ${WRITE_EXPORT_ON_CHANGE:-true}
      EXPORT_PATH: ${EXPORT_PATH:-/exports/inventory.xlsx}
      DNS_RESOLVE_IP: ${DNS_RESOLVE_IP:-true}
      DNS_QUERY_TIMEOUT_SECONDS: ${DNS_QUERY_TIMEOUT_SECONDS:-1.5}
      DNS_RESOLVE_WORKERS: ${DNS_RESOLVE_WORKERS:-24}
      WIFI_NETWORKS: ${WIFI_NETWORKS:-}
      PRINTERS_FILE: ${PRINTERS_FILE:-/printers/printers.csv}
      PRINTER_CLEAR_BEFORE_SYNC: ${PRINTER_CLEAR_BEFORE_SYNC:-true}
      PRINTERS_DELETE_MISSING: ${PRINTERS_DELETE_MISSING:-true}
      PRINTER_SNMP_DISCOVERY_ENABLED: ${PRINTER_SNMP_DISCOVERY_ENABLED:-true}
      PRINTER_SNMP_SUBNETS: ${PRINTER_SNMP_SUBNETS:-}
      PRINTER_SNMP_COMMUNITY: ${PRINTER_SNMP_COMMUNITY:-public}
      PRINTER_SNMP_PORT: ${PRINTER_SNMP_PORT:-161}
      PRINTER_SNMP_TIMEOUT_SECONDS: ${PRINTER_SNMP_TIMEOUT_SECONDS:-1.0}
      PRINTER_SNMP_WORKERS: ${PRINTER_SNMP_WORKERS:-64}
      PRINTER_SNMP_MAX_HOSTS: ${PRINTER_SNMP_MAX_HOSTS:-4096}
      PRINTER_SNMP_REQUIRE_KEYWORDS: ${PRINTER_SNMP_REQUIRE_KEYWORDS:-false}
      PRINTER_HTTP_DISCOVERY_ENABLED: ${PRINTER_HTTP_DISCOVERY_ENABLED:-true}
      PRINTER_HTTP_REQUIRE_KEYWORDS: ${PRINTER_HTTP_REQUIRE_KEYWORDS:-true}
      PRINTER_HTTP_NAME_ENABLED: ${PRINTER_HTTP_NAME_ENABLED:-true}
      PRINTER_HTTP_NAME_PORTS: ${PRINTER_HTTP_NAME_PORTS:-80,443,8080,8000,8443,631}
      PRINTER_HTTP_NAME_PATHS: ${PRINTER_HTTP_NAME_PATHS:-/,/index.html,/index.htm,/home.html,/status.html,/start.htm,/main.html,/device_status.html,/general/status.html,/web/guest/en/websys/webArch/mainFrame.cgi}
      PRINTER_HTTP_NAME_TIMEOUT_SECONDS: ${PRINTER_HTTP_NAME_TIMEOUT_SECONDS:-1.5}
      PRINTER_TCP_DISCOVERY_ENABLED: ${PRINTER_TCP_DISCOVERY_ENABLED:-true}
      PRINTER_TCP_PORTS: ${PRINTER_TCP_PORTS:-9100,515,631}
      PRINTER_TCP_TIMEOUT_SECONDS: ${PRINTER_TCP_TIMEOUT_SECONDS:-0.7}
      PRINTER_REVERSE_DNS_ENABLED: ${PRINTER_REVERSE_DNS_ENABLED:-true}
      PRINTER_SNMP_INCLUDE_KEYWORDS: ${PRINTER_SNMP_INCLUDE_KEYWORDS:-printer,mfp,mfu,canon,hp,hewlett,packard,kyocera,xerox,epson,brother,ricoh,sharp,lexmark,konica,minolta,samsung,laserjet,officejet,deskjet,imageclass,workcentre,versalink,phaser,docucentre}
      PRINTER_SNMP_EXCLUDE_KEYWORDS: ${PRINTER_SNMP_EXCLUDE_KEYWORDS:-switch,router,firewall,vmware,esxi,linux,windows,ups,nas}
      NETWORK_DEVICE_DISCOVERY_ENABLED: ${NETWORK_DEVICE_DISCOVERY_ENABLED:-true}
      NETWORK_DEVICE_SUBNETS: ${NETWORK_DEVICE_SUBNETS:-}
      NETWORK_DEVICE_CLEAR_BEFORE_SYNC: ${NETWORK_DEVICE_CLEAR_BEFORE_SYNC:-false}
      NETWORK_DEVICE_DELETE_MISSING: ${NETWORK_DEVICE_DELETE_MISSING:-true}
      NETWORK_DEVICE_SNMP_COMMUNITY: ${NETWORK_DEVICE_SNMP_COMMUNITY:-public}
      NETWORK_DEVICE_SNMP_PORT: ${NETWORK_DEVICE_SNMP_PORT:-161}
      NETWORK_DEVICE_SNMP_TIMEOUT_SECONDS: ${NETWORK_DEVICE_SNMP_TIMEOUT_SECONDS:-1.0}
      NETWORK_DEVICE_WORKERS: ${NETWORK_DEVICE_WORKERS:-64}
      NETWORK_DEVICE_MAX_HOSTS: ${NETWORK_DEVICE_MAX_HOSTS:-4096}
      NETWORK_DEVICE_HTTP_ENABLED: ${NETWORK_DEVICE_HTTP_ENABLED:-true}
      NETWORK_DEVICE_HTTP_PORTS: ${NETWORK_DEVICE_HTTP_PORTS:-80,443,8080,8000,8443}
      NETWORK_DEVICE_HTTP_TIMEOUT_SECONDS: ${NETWORK_DEVICE_HTTP_TIMEOUT_SECONDS:-1.5}
      NETWORK_DEVICE_TLS_NAME_ENABLED: ${NETWORK_DEVICE_TLS_NAME_ENABLED:-true}
      NETWORK_DEVICE_TLS_PORTS: ${NETWORK_DEVICE_TLS_PORTS:-443,8443}
      NETWORK_DEVICE_TLS_TIMEOUT_SECONDS: ${NETWORK_DEVICE_TLS_TIMEOUT_SECONDS:-1.5}
      NETWORK_DEVICE_TCP_DISCOVERY_ENABLED: ${NETWORK_DEVICE_TCP_DISCOVERY_ENABLED:-true}
      NETWORK_DEVICE_TCP_PORTS: ${NETWORK_DEVICE_TCP_PORTS:-22,23,80,443,445,3389,5985,5986,8080,8443}
      NETWORK_DEVICE_TCP_TIMEOUT_SECONDS: ${NETWORK_DEVICE_TCP_TIMEOUT_SECONDS:-0.7}
      NETWORK_DEVICE_REVERSE_DNS_ENABLED: ${NETWORK_DEVICE_REVERSE_DNS_ENABLED:-true}
