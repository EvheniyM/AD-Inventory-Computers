  hardware:
    build: .
    command: python -m app.hardware_collector
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD:-change_this_db_password}@db:5432/${POSTGRES_DB:-inventory}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Kiev}
      TZ: ${APP_TIMEZONE:-Europe/Kiev}
      AD_SERVER: ${AD_SERVER:-}
      AD_USER: ${AD_USER:-}
      AD_PASSWORD: ${AD_PASSWORD:-}
      AD_USE_SSL: ${AD_USE_SSL:-true}
      AD_REQUIRE_LDAPS: ${AD_REQUIRE_LDAPS:-true}
      AD_VALIDATE_CERT: ${AD_VALIDATE_CERT:-false}
      AD_CA_CERT_FILE: ${AD_CA_CERT_FILE:-/certs/ad/ad-ca.crt}
      AD_ALLOW_INSECURE_TLS: ${AD_ALLOW_INSECURE_TLS:-false}
      AD_USER_BASE_DN: ${AD_USER_BASE_DN:-DC=example,DC=local}
      AD_COMPUTER_PHYSICAL_BASE_DN: ${AD_COMPUTER_PHYSICAL_BASE_DN:-OU=Workstations,DC=example,DC=local}
      AD_COMPUTER_VIRTUAL_BASE_DN: ${AD_COMPUTER_VIRTUAL_BASE_DN:-OU=Virtual Workstations,OU=Workstations,DC=example,DC=local}
      AD_PHYSICAL_SEARCH_SCOPE: ${AD_PHYSICAL_SEARCH_SCOPE:-LEVEL}
      AD_VIRTUAL_SEARCH_SCOPE: ${AD_VIRTUAL_SEARCH_SCOPE:-SUBTREE}
      HARDWARE_COLLECTOR_ENABLED: ${HARDWARE_COLLECTOR_ENABLED:-false}
      HARDWARE_COLLECT_NETWORK_SERVERS: ${HARDWARE_COLLECT_NETWORK_SERVERS:-true}
      HARDWARE_COLLECT_MEMORY_DETAILS: ${HARDWARE_COLLECT_MEMORY_DETAILS:-true}
      HARDWARE_COLLECT_MONITORS: ${HARDWARE_COLLECT_MONITORS:-true}
      HARDWARE_COLLECT_NETWORK_ADAPTERS: ${HARDWARE_COLLECT_NETWORK_ADAPTERS:-true}
      HARDWARE_MAX_MONITORS: ${HARDWARE_MAX_MONITORS:-2}
      HARDWARE_CLEAR_BEFORE_COLLECTION: ${HARDWARE_CLEAR_BEFORE_COLLECTION:-false}
      HARDWARE_COLLECTION_INTERVAL_SECONDS: ${HARDWARE_COLLECTION_INTERVAL_SECONDS:-21600}
      HARDWARE_COLLECT_WORKERS: ${HARDWARE_COLLECT_WORKERS:-8}
      HARDWARE_COLLECTION_MODE: ${HARDWARE_COLLECTION_MODE:-wmic}
      HARDWARE_WINRM_USER: ${HARDWARE_WINRM_USER:-}
      HARDWARE_WINRM_PASSWORD: ${HARDWARE_WINRM_PASSWORD:-}
      HARDWARE_WINRM_SCHEME: ${HARDWARE_WINRM_SCHEME:-http}
      HARDWARE_WINRM_PORT: ${HARDWARE_WINRM_PORT:-5985}
      HARDWARE_WINRM_TRANSPORT: ${HARDWARE_WINRM_TRANSPORT:-ntlm}
      HARDWARE_WINRM_SERVER_CERT_VALIDATION: ${HARDWARE_WINRM_SERVER_CERT_VALIDATION:-ignore}
      HARDWARE_WINRM_PRECHECK_ENABLED: ${HARDWARE_WINRM_PRECHECK_ENABLED:-true}
      HARDWARE_WINRM_PRECHECK_TIMEOUT_SECONDS: ${HARDWARE_WINRM_PRECHECK_TIMEOUT_SECONDS:-3.0}
      HARDWARE_WINRM_OPERATION_TIMEOUT_SECONDS: ${HARDWARE_WINRM_OPERATION_TIMEOUT_SECONDS:-20}
      HARDWARE_WINRM_READ_TIMEOUT_SECONDS: ${HARDWARE_WINRM_READ_TIMEOUT_SECONDS:-30}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./certs/ad:/certs/ad:ro
    restart: unless-stopped

volumes:
  pgdata:
